# Alembic config for the Agent Orchestration service (separate deployable, ADR-001).
#
# This service owns the `agent` Postgres schema and its own migration history, distinct from
# apps/api's. Both run against the same physical database (Phase 4 §1) but from separate migration
# chains — apps/api's `identity` schema must exist first (agent.* tables FK into it), which the
# deployment sequences (see docker-compose / Increment 12 doc §"deferred").

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = driver://user:pass@localhost/dbname


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
