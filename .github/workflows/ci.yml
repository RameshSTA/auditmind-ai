name: CI — apps/api

# Runs the Phase 3 §13 pipeline stages that exist at this increment's scope: lint, type-check,
# boundary-lint, unit tests, integration tests. The evaluation gate (Phase 3 §13, Phase 9) is
# added once an agent or prompt exists to evaluate.

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: apps/api

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Import boundaries (import-linter)
        run: PYTHONPATH=src lint-imports

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: mypy --strict
        run: mypy src

  unit-tests:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: pytest — unit
        run: pytest tests/unit -v

  integration-tests:
    runs-on: ubuntu-latest
    needs: type-check
    # A real Postgres service — the RLS tests (Phase 4 §12) assert an actual database-enforced
    # isolation guarantee, which cannot be verified against a mock or an in-memory substitute
    # (SQLite has no Row-Level Security at all). Credentials here are CI-only, throwaway values,
    # not the pattern production uses (Phase 11 §7/§8 — Key Vault-managed). Uses the pgvector image
    # (not plain `postgres:16`) since Increment 08's migration requires the `vector` extension —
    # the same image `docker-compose.yml` already uses for local dev. Neo4j (Increment 09) is the
    # same reasoning applied to a second database: the cross-engagement isolation tests in
    # `test_knowledge_graph_isolation.py` assert a real Neo4j-enforced (application-code-enforced,
    # see that context's own module docstring) guarantee, not something a fake can stand in for.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: auditmind
          POSTGRES_PASSWORD: auditmind_ci_only
          POSTGRES_DB: auditmind_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auditmind"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/auditmind_ci_only
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUDITMIND_MIGRATION_DATABASE_URL: "postgresql+asyncpg://auditmind:auditmind_ci_only@localhost:5432/auditmind_ci"
      AUDITMIND_APP_DB_PASSWORD: "auditmind_app_ci_only"
      AUDITMIND_TEST_DB_HOST: localhost
      AUDITMIND_TEST_DB_PORT: "5432"
      AUDITMIND_TEST_DB_NAME: auditmind_ci
      AUDITMIND_TEST_APP_USER: auditmind_app
      AUDITMIND_TEST_APP_PASSWORD: "auditmind_app_ci_only"
      AUDITMIND_NEO4J_URI: "bolt://localhost:7687"
      AUDITMIND_NEO4J_USER: neo4j
      AUDITMIND_NEO4J_PASSWORD: "auditmind_ci_only"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: Apply migrations
        run: PYTHONPATH=src alembic upgrade head
      - name: pytest — integration
        run: pytest tests/integration -v

  build-image:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push — registry push wired up when ACR credentials exist, Phase 12 §6)
        run: docker build -t auditmind-api:${{ github.sha }} apps/api
