name: CI — services/agent-orchestrator

# Mirrors .github/workflows/ci.yml's pipeline stages exactly (lint, type-check, boundary-lint,
# unit tests, integration tests, build-image), for the second independently deployable service
# (ADR-001). The one structural difference: `agent.*`'s migration FKs into `identity.*`
# (apps/api's schema), so the integration-tests job applies apps/api's migration first, against
# the same Postgres service, before this service's own migration can run.

on:
  pull_request:
    paths:
      - "services/agent-orchestrator/**"
      - ".github/workflows/ci-agent-orchestrator.yml"
  push:
    branches: [main]
    paths:
      - "services/agent-orchestrator/**"
      - ".github/workflows/ci-agent-orchestrator.yml"

defaults:
  run:
    working-directory: services/agent-orchestrator

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Import boundaries (import-linter)
        run: PYTHONPATH=src lint-imports

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: mypy --strict
        run: mypy src

  unit-tests:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: pytest — unit
        run: pytest tests/unit -v

  integration-tests:
    runs-on: ubuntu-latest
    needs: type-check
    # Real Postgres, same reasoning apps/api's integration-tests job documents: RLS is a real,
    # database-enforced guarantee that a mock/SQLite substitute cannot verify.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: auditmind
          POSTGRES_PASSWORD: auditmind_ci_only
          POSTGRES_DB: auditmind_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auditmind"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      AGENT_MIGRATION_DATABASE_URL: "postgresql+asyncpg://auditmind:auditmind_ci_only@localhost:5432/auditmind_ci"
      AGENT_TEST_DB_HOST: localhost
      AGENT_TEST_DB_PORT: "5432"
      AGENT_TEST_DB_NAME: auditmind_ci
      AGENT_TEST_APP_USER: auditmind_app
      AGENT_TEST_APP_PASSWORD: "auditmind_app_ci_only"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install apps/api (dev extras) — its identity migration must run first
        working-directory: apps/api
        run: pip install -e ".[dev]"
      - name: Apply apps/api's migrations (creates identity.*, the auditmind_app role)
        working-directory: apps/api
        env:
          AUDITMIND_MIGRATION_DATABASE_URL: "postgresql+asyncpg://auditmind:auditmind_ci_only@localhost:5432/auditmind_ci"
          AUDITMIND_APP_DB_PASSWORD: "auditmind_app_ci_only"
        run: PYTHONPATH=src alembic upgrade head
      - name: Install this service (dev extras)
        run: pip install -e ".[dev]"
      - name: Apply this service's migrations (agent.* — FKs into identity.*)
        run: PYTHONPATH=src alembic upgrade head
      - name: pytest — integration
        run: pytest tests/integration -v

  build-image:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push — registry push wired up when ACR credentials exist)
        run: docker build -t auditmind-agent-orchestrator:${{ github.sha }} services/agent-orchestrator
