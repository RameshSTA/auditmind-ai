# LiteLLM gateway configuration.
#
# This is the single declarative source of truth for which models the Agent Orchestration service
# may call and how they are routed. Agent nodes name a *model alias* from `model_list` below (e.g.
# `primary-model`) — never a raw provider model id — so switching the underlying model, adding a
# fallback, or changing provider is an edit to this file, not to any Python code. No domain service
# imports a provider SDK directly; every model call goes through this gateway.
#
# The provider credential is read from `AGENT_LLM_API_KEY` and is never written to this file.
# Pointing `litellm_params.model` at a different provider's model id is the entire swap needed to
# change providers — the alias names (`primary-model` / `fast-model`) stay stable for every caller.

model_list:
  # The default alias agent nodes route to (AGENT_DEFAULT_MODEL).
  - model_name: primary-model
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/AGENT_LLM_API_KEY

  # A faster/cheaper alias for lightweight, high-volume calls (e.g. the planner's decomposition, or
  # the evaluator's groundedness check) where a smaller model is sufficient. Which nodes actually use
  # it is a per-node `model=` override, a tuning decision deferred until real call volume exists.
  - model_name: fast-model
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/AGENT_LLM_API_KEY

# Per-tool/per-model rate limits and circuit-breaker behavior are configured centrally at the
# gateway so one misbehaving agent can't exhaust the shared LLM resource on behalf of the whole
# run. These are conservative starting values, tuned once real traffic exists.
router_settings:
  num_retries: 3            # attempts on a gateway timeout / rate limit before the circuit breaker
                            # opens (surfaced up as a retryable error class).
  timeout: 60               # seconds per model call — a slow branch carries its own timeout.
  allowed_fails: 3          # circuit-breaker: trip after this many consecutive failures.
